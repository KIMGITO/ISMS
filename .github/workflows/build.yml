name: Build App Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: DESKTOP BUILDS (Windows & Linux)
  # ─────────────────────────────────────────────────────────────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.os-name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-name: Windows
            rust-target: x86_64-pc-windows-msvc
          - runner: ubuntu-22.04
            os-name: Linux
            rust-target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os-name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libwebkit2gtk-4.0-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npm run build

      # For Windows, we ONLY build the MSI bundle to bypass the broken NSIS 3.11 .exe compiler.
      - name: Build Tauri Desktop (Windows MSI Only)
        if: matrix.os-name == 'Windows'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npx tauri build --bundles msi

      # For Linux, we build default bundles (AppImage, deb).
      - name: Build Tauri Desktop (Linux)
        if: matrix.os-name == 'Linux'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npx tauri build

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Artifacts-${{ matrix.os-name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: ANDROID (APK) BUILD
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Temurin JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npm run build

      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\n\r ' | base64 --decode > my-release.keystore
            echo "Keystore decoded successfully to my-release.keystore."
          else
            echo "Warning: Keystore secret not found. App will not be signed."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android Release APK (Unsigned)
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS || 'my-key-alias' }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -f "my-release.keystore" ]; then
            export BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools | sort -rn | head -1)
            export APKSIGNER=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner
            export ZIPALIGN=$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign

            echo "Aligning APK..."
            $ZIPALIGN -v 4 android/app/build/outputs/apk/release/app-release-unsigned.apk kaykay-release-aligned.apk > /dev/null

            echo "Signing APK..."
            # Note: We pass the password environment variables directly
            $APKSIGNER sign --ks my-release.keystore \
              --ks-key-alias "$ANDROID_KEYSTORE_ALIAS" \
              --ks-pass env:ANDROID_KEYSTORE_PASSWORD \
              --key-pass env:ANDROID_KEY_PASSWORD \
              --out kaykay-release-signed.apk \
              kaykay-release-aligned.apk
            
            echo "Verifying Signature..."
            $APKSIGNER verify kaykay-release-signed.apk
          else
            echo "Skipping signing step because my-release.keystore is missing."
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk kaykay-release-signed.apk
          fi

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Artifacts
          path: kaykay-release-signed.apk
          if-no-files-found: warn
          retention-days: 30