name: Build App Installers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: DESKTOP BUILDS (Windows & Linux)
  # ─────────────────────────────────────────────────────────────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.os-name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-name: Windows
            rust-target: x86_64-pc-windows-msvc
          - runner: ubuntu-22.04
            os-name: Linux
            rust-target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.os-name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libwebkit2gtk-4.0-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install NPM dependencies
        run: npm ci

      # This forces the runner to use the latest Tauri packages, fixing the NSIS Windows bug
      - name: Update Tauri & Rust Dependencies
        run: |
          npm install -D @tauri-apps/cli@latest
          cd src-tauri && cargo update

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npm run build

      - name: Build Tauri Desktop (${{ matrix.os-name }})
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npx tauri build

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-Artifacts-${{ matrix.os-name }}
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: ANDROID (APK) BUILD
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Temurin JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android'

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-cargo-

      - name: Install NPM dependencies
        run: npm ci

      - name: Update Tauri & Rust Dependencies
        run: |
          npm install -D @tauri-apps/cli@latest
          cd src-tauri && cargo update

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npm run build

      # Fail-proof Node.js decoder that ignores YAML formatting and whitespace
      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            mkdir -p src-tauri/gen/android/app
            node -e "
              const fs = require('fs');
              let data = process.env.ANDROID_KEYSTORE_BASE64.replace(/\s+/g, '');
              while (data.length % 4 !== 0) data += '=';
              fs.writeFileSync('src-tauri/gen/android/app/release.decrypted.keystore', Buffer.from(data, 'base64'));
            "
            echo "Keystore decoded successfully."
          else
            echo "Keystore secret not found, skipping signing."
          fi

      - name: Build Android APK
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          TAURI_ANDROID_KEYSTORE: 'release.decrypted.keystore'
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx tauri android build

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Android-Artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30
