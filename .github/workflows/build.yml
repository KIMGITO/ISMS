name: Build App Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: DESKTOP BUILDS (Windows & Linux)
  # ─────────────────────────────────────────────────────────────────────────
  build-desktop:
    name: Build Desktop (${{ matrix.os-name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            os-name: Windows
            rust-target: x86_64-pc-windows-msvc

          - runner: ubuntu-22.04
            os-name: Linux
            rust-target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Hardened Linux dependency installation with mirror-fallback logic
      - name: Install Linux dependencies
        if: matrix.os-name == 'Linux'
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get clean
          sudo apt-get update --fix-missing
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev || \
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npm run build

      - name: Build Tauri Desktop (${{ matrix.os-name }})
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npx tauri build

      # Upload Windows Artifacts
      - name: Upload Windows NSIS installer (.exe)
        if: matrix.os-name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Windows-NSIS-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Windows MSI installer
        if: matrix.os-name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Windows-MSI-Installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      # Upload Linux Artifacts
      - name: Upload Linux AppImage
        if: matrix.os-name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Linux .deb package
        if: matrix.os-name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Linux-deb-Package
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

      # Upload to GitHub Releases (only on version tags)
      - name: Upload Desktop to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: ANDROID (APK) BUILD
  # ─────────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java (Temurin JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: "aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-android-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
        run: npm run build

      # Setup Keystore safely (Runs only if ANDROID_KEYSTORE_BASE64 exists)
      - name: Decode Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Skipping keystore generation - secret not found."
          else
            mkdir -p src-tauri/gen/android/app
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > src-tauri/gen/android/app/release.decrypted.keystore
          fi

      # Build APK using Tauri CLI (Using 'npx tauri' for reliable invocation)
      - name: Build Android APK
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder' }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME || 'Kim' }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          TAURI_ANDROID_KEYSTORE: "release.decrypted.keystore"
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: npx tauri android build

      # Upload Android Artifacts
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Android-APK
          path: src-tauri/gen/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Android AAB (App Bundle)
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Android-Bundle
          path: src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn
          retention-days: 30

      # Upload to GitHub Releases (only on version tags)
      - name: Upload Android to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && hashFiles('src-tauri/gen/android/app/build/outputs/apk/release/*.apk') != ''
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/gen/android/app/build/outputs/apk/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}