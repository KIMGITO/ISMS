name: Build Desktop Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"          # Triggers on version tags like v1.0.0
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.os-name }} installer
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────────────────
          - runner: windows-latest
            os-name: Windows
            rust-target: x86_64-pc-windows-msvc

          # ── Linux ──────────────────────────────────────────────────────────
          - runner: ubuntu-22.04
            os-name: Linux
            rust-target: x86_64-unknown-linux-gnu

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Install Linux system dependencies (WebKit2GTK + libs) ──────────
      - name: Install Linux dependencies
        if: matrix.os-name == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config \
            build-essential \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      # ── 3. Setup Node.js ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # ── 4. Setup Rust stable ───────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      # ── 5. Cache Cargo dependencies ────────────────────────────────────────
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # ── 6. Install npm dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 7. Build Vite frontend ─────────────────────────────────────────────
      - name: Build frontend
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      # ── 8. Build Tauri app ─────────────────────────────────────────────────
      - name: Build Tauri (${{ matrix.os-name }})
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AI_NAME: ${{ secrets.VITE_AI_NAME }}
          VITE_UNSPLASH_ACCESS_KEY: ${{ secrets.VITE_UNSPLASH_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run tauri:build

      # ── 9. Upload Windows artifacts ────────────────────────────────────────
      - name: Upload Windows NSIS installer (.exe)
        if: matrix.os-name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Windows-NSIS-Installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Windows MSI installer
        if: matrix.os-name == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Windows-MSI-Installer
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
          retention-days: 30

      # ── 10. Upload Linux artifacts ─────────────────────────────────────────
      - name: Upload Linux AppImage
        if: matrix.os-name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Linux-AppImage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Linux .deb package
        if: matrix.os-name == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: KayKay-Linux-deb-Package
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn
          retention-days: 30

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
